#
# cargo-deny configuration for VPNShroud
# Enforces license compatibility with dual-licensing (GPL-3.0 + Commercial)
#
# Usage:
#   cargo install cargo-deny
#   cargo deny check licenses
#   cargo deny check all

[licenses]
version = 2
unlicensed = "deny"

# Permissive licenses compatible with both GPL-3.0 and commercial licensing
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unlicense",
    "Zlib",
    "CC0-1.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]

# Copyleft licenses that block commercial relicensing
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-3.0",
    "AGPL-1.0",
    "SSPL-1.0",
]

# Treat any copyleft license not explicitly allowed as denied
copyleft = "deny"

# Allow dual-licensed crates where at least one license is permitted
allow-osi-fsf-free = "neither"

confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[licenses.private]
ignore = false

[bans]
multiple-versions = "warn"
wildcards = "allow"

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
