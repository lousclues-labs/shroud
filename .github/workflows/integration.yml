name: Integration Tests

on:
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - security_ipc
          - security_crash
          - security_signals
          - security_race
          - leak_test

# This workflow requires privileged access and should only be run manually
# on self-hosted runners with appropriate permissions.
#
# Required environment:
# - Root/sudo access for iptables manipulation
# - NetworkManager running
# - D-Bus session available
# - No VPN connections active

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  integration:
    name: Integration Tests (Manual)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev \
            pkg-config \
            iptables \
            iproute2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build tests
        run: cargo test --no-run --all-features

      - name: Note about privileged tests
        run: |
          echo "=========================================="
          echo "INTEGRATION TESTS NOTICE"
          echo "=========================================="
          echo ""
          echo "These tests require privileged access that"
          echo "GitHub Actions runners do not have:"
          echo ""
          echo "  - Root/sudo for iptables modification"
          echo "  - NetworkManager with VPN connections"
          echo "  - D-Bus session bus access"
          echo ""
          echo "To run these tests locally:"
          echo "  sudo -E cargo test --test <test_name> -- --ignored"
          echo ""
          echo "The tests have been built successfully."
          echo "Skipping actual test execution in CI."
          echo "=========================================="

      - name: List available integration tests
        run: |
          echo "Available integration test files:"
          ls -la tests/*.rs
