name: Security Audit

on:
  schedule:
    - cron: '0 9 * * 0'  # Weekly on Sunday at 9am UTC
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ===========================================================================
  # Security Audit
  # ===========================================================================
  
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      
      - name: Run audit
        run: cargo audit
      
      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔒 Security audit found vulnerabilities',
              body: 'The weekly security audit found vulnerabilities. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.',
              labels: ['security', 'automated']
            })

  # ===========================================================================
  # Dependency Updates Check
  # ===========================================================================
  
  dependency-updates:
    name: Check Dependency Updates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Install cargo-outdated
        run: cargo install cargo-outdated --locked
      
      - name: Check outdated dependencies
        run: cargo outdated --exit-code 1 || true
      
      - name: Report outdated
        run: cargo outdated || true

  # ===========================================================================
  # Coverage Report (Monthly)
  # ===========================================================================
  
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config
      
      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: "coverage"
      
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked --force
      
      - name: Run tarpaulin
        run: |
          cargo tarpaulin \
            --verbose \
            --all-features \
            --workspace \
            --timeout 300 \
            --out xml \
            --out html \
            --output-dir coverage \
            --skip-clean \
            --engine llvm \
            --exclude-files tests/e2e.rs \
            --exclude-files tests/chaos.rs \
            || echo "Tarpaulin completed with warnings"
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/cobertura.xml
          fail_ci_if_error: false
          verbose: true
      
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
