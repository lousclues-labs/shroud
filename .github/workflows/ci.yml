name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ===========================================================================
  # STAGE 1: Quick Checks (run in parallel, fail fast)
  # ===========================================================================
  
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-v2"
      - run: cargo clippy --all-targets --all-features -- -D warnings

  check:
    name: Compile Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-v2"
      - run: cargo check --all-targets --all-features

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-v2"
      - run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  # ===========================================================================
  # STAGE 2: Unit Tests
  # ===========================================================================
  
  unit-tests:
    name: Unit Tests
    needs: [format, clippy, check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-v2"
      
      - name: Run unit tests
        run: cargo test --bins --all-features

  # ===========================================================================
  # STAGE 3: Integration Tests
  # ===========================================================================
  
  integration-tests:
    name: Integration Tests
    needs: [unit-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-v2"
      
      - name: Run integration tests
        run: cargo test --test integration --all-features --verbose

  security-tests:
    name: Security Tests (Non-Privileged)
    needs: [unit-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-v2"
      
      - name: Run security tests (non-privileged only)
        run: cargo test --test security --all-features --verbose
      
      - name: Note about privileged tests
        run: |
          echo "=========================================="
          echo "SECURITY TESTS NOTICE"
          echo "=========================================="
          echo ""
          echo "Some security tests require privileged access"
          echo "and are marked with #[ignore]."
          echo ""
          echo "To run privileged tests locally:"
          echo "  sudo -E cargo test --test security -- --ignored"
          echo "=========================================="

  # ===========================================================================
  # STAGE 4: E2E Tests
  # ===========================================================================
  
  e2e-desktop:
    name: Desktop E2E Tests
    needs: [integration-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev \
            pkg-config \
            network-manager \
            iptables \
            iproute2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-v2"
      
      - name: Build
        run: cargo build --release
      
      - name: Run desktop E2E tests (non-privileged)
        run: |
          chmod +x tests/e2e/desktop/run-desktop-tests.sh
          tests/e2e/desktop/run-desktop-tests.sh --unprivileged || true
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-desktop-results
          path: tests/e2e/desktop/results/
          if-no-files-found: ignore

  e2e-headless:
    name: Headless E2E Tests
    needs: [integration-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev \
            pkg-config \
            network-manager \
            iptables \
            iproute2 \
            jq
          sudo systemctl start NetworkManager || true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-v2"
      
      - name: Build
        run: cargo build --release
      
      - name: Setup test environment
        run: |
          sudo mkdir -p /etc/shroud /var/lib/shroud /run/shroud
          sudo chmod 755 /etc/shroud /var/lib/shroud /run/shroud
          
          sudo tee /etc/shroud/config.toml > /dev/null << 'EOF'
          version = 1
          auto_reconnect = true
          
          [headless]
          auto_connect = false
          kill_switch_on_boot = false
          require_kill_switch = false
          
          [killswitch]
          allow_lan = true
          
          [gateway]
          enabled = false
          kill_switch_forwarding = true
          EOF
      
      - name: Run headless E2E tests (unprivileged)
        run: |
          chmod +x tests/e2e/headless/run-tests.sh
          tests/e2e/headless/run-tests.sh --unprivileged
      
      - name: Note about privileged tests
        run: |
          echo "=========================================="
          echo "E2E TESTS NOTICE"
          echo "=========================================="
          echo ""
          echo "Some tests require privileged access:"
          echo "  - Boot kill switch tests (iptables)"
          echo "  - Gateway tests (iptables, ip forwarding)"
          echo ""
          echo "To run privileged tests locally:"
          echo "  sudo -E tests/e2e/run-privileged.sh"
          echo "=========================================="
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-headless-results
          path: tests/e2e/results/
          if-no-files-found: ignore

  # ===========================================================================
  # MSRV Check
  # ===========================================================================
  
  msrv:
    name: MSRV Check
    needs: [format]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-v2"
      - name: Check MSRV
        run: cargo check --all-features

  # ===========================================================================
  # FINAL STATUS CHECK
  # ===========================================================================
  
  ci-success:
    name: CI Success
    needs: [e2e-desktop, e2e-headless, security-tests, docs, msrv]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.e2e-desktop.result }}" == "failure" ]] || \
             [[ "${{ needs.e2e-headless.result }}" == "failure" ]] || \
             [[ "${{ needs.security-tests.result }}" == "failure" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All CI checks passed!"
