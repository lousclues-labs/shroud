name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # STAGE 1: Quick Checks (parallel, fail fast)
  # ===========================================================================

  format:
    name: Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy Lints
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-v3"
      - run: cargo clippy --all-targets --all-features -- -D warnings

  check:
    name: Compile Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-v3"
      - run: cargo check --all-targets --all-features

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-v3"
      - run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  # ===========================================================================
  # STAGE 2: Unit Tests (fast, parallel)
  # ===========================================================================

  unit-tests:
    name: Unit Tests
    needs: [format, clippy, check]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-v3"

      - name: Run unit tests
        run: cargo test --bins --all-features -- --test-threads=4

      - name: Run regression tests
        run: cargo test --test regression --all-features

  # ===========================================================================
  # STAGE 3: Integration Tests (use mocks, contribute to coverage)
  # ===========================================================================

  integration-tests:
    name: Integration Tests
    needs: [unit-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-v3"

      - name: Run integration tests
        run: cargo test --test integration --all-features -- --test-threads=2

      - name: Run stability tests
        run: cargo test --test stability --all-features

  security-tests:
    name: Security Tests
    needs: [unit-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-v3"

      - name: Run security tests (non-privileged)
        run: cargo test --test security --all-features

      - name: Note about privileged tests
        run: |
          echo "=========================================="
          echo "Some security tests require sudo and are marked #[ignore]"
          echo "Run locally: sudo -E cargo test --test security -- --ignored"
          echo "=========================================="

  # ===========================================================================
  # STAGE 4: Coverage (unit + integration only, no process spawning)
  # ===========================================================================

  coverage:
    name: Coverage
    needs: [integration-tests, security-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-v3"

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Pre-cleanup
        run: pkill -9 shroud 2>/dev/null || true

      - name: Generate coverage
        run: |
          cargo tarpaulin \
            --bins --lib \
            --test integration \
            --test stability \
            --out xml --out html \
            --output-dir coverage \
            --timeout 120 \
            --exclude-files "tests/e2e/*" \
            --exclude-files "tests/e2e.rs" \
            --exclude-files "tests/chaos/*" \
            --exclude-files "tests/chaos.rs" \
            -- --test-threads=2
        timeout-minutes: 8
        continue-on-error: true

      - name: Post-cleanup
        if: always()
        run: pkill -9 shroud 2>/dev/null || true

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/cobertura.xml
          fail_ci_if_error: false

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore

  # ===========================================================================
  # STAGE 5: E2E Tests (isolated, process-spawning tests)
  # ===========================================================================

  e2e-tests:
    name: E2E Tests
    needs: [integration-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev \
            pkg-config \
            network-manager \
            iptables \
            iproute2 \
            dbus-x11
          sudo systemctl start dbus || true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-v3"

      - name: Build release
        run: cargo build --release

      - name: Pre-cleanup
        run: pkill -9 -f shroud 2>/dev/null || true

      - name: Run E2E tests
        run: |
          timeout 300 cargo test --test e2e --all-features -- --test-threads=1 2>&1 || {
            exit_code=$?
            if [[ $exit_code -eq 124 ]]; then
              echo "E2E tests timed out"
              exit 1
            fi
            echo "Some E2E tests failed (expected in CI without full D-Bus)"
          }
        continue-on-error: true

      - name: Final cleanup
        if: always()
        run: |
          pkill -9 -f "shroud --headless" 2>/dev/null || true
          pkill -9 -x shroud 2>/dev/null || true

  # ===========================================================================
  # MSRV Check
  # ===========================================================================

  msrv:
    name: MSRV Check
    needs: [format]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-v3"
      - name: Check MSRV
        run: cargo check --all-features

  # ===========================================================================
  # FINAL STATUS CHECK
  # ===========================================================================

  ci-success:
    name: CI Success
    needs: [e2e-tests, coverage, docs, msrv]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          echo "Job results:"
          echo "  e2e-tests: ${{ needs.e2e-tests.result }}"
          echo "  coverage: ${{ needs.coverage.result }}"
          echo "  docs: ${{ needs.docs.result }}"
          echo "  msrv: ${{ needs.msrv.result }}"
          echo ""

          # E2E and coverage are allowed to have partial failures
          # Only fail if format, clippy, check, unit, integration, security fail
          if [[ "${{ needs.docs.result }}" == "failure" ]] || \
             [[ "${{ needs.msrv.result }}" == "failure" ]]; then
            echo "Critical jobs failed"
            exit 1
          fi

          echo "✅ All critical CI checks passed!"
