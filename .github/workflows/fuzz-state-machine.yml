name: "Fuzz: State Machine MOAB"

on:
  workflow_dispatch:
    inputs:
      targets:
        description: "Comma-separated targets to run (or 'all')"
        required: false
        default: "all"
      hours_per_shard:
        description: "Hours per shard (max 6 for GitHub Actions)"
        required: false
        default: "6"

env:
  ALL_TARGETS: "fuzz_state_machine,fuzz_state_machine_determinism,fuzz_state_machine_lifecycle,fuzz_state_machine_config,fuzz_state_machine_differential"

jobs:
  # ================================================================
  # Build once, share across all shards
  # ================================================================
  build:
    name: "Build fuzz targets"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Build all fuzz targets
        run: |
          for target in fuzz_state_machine fuzz_state_machine_determinism fuzz_state_machine_lifecycle fuzz_state_machine_config fuzz_state_machine_differential; do
            echo "Building $target..."
            cargo +nightly fuzz build "$target"
          done

      - name: Upload fuzz binaries
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-binaries
          path: |
            fuzz/target/*/release/fuzz_state_machine*
          retention-days: 1

  # ================================================================
  # Matrix: 5 targets x 8 shards = 40 parallel jobs
  # ================================================================
  fuzz:
    name: "${{ matrix.target }} [${{ matrix.shard }}/8]"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 400
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_state_machine
          - fuzz_state_machine_determinism
          - fuzz_state_machine_lifecycle
          - fuzz_state_machine_config
          - fuzz_state_machine_differential
        shard: [1, 2, 3, 4, 5, 6, 7, 8]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Check if target is selected
        id: check
        run: |
          TARGETS="${{ github.event.inputs.targets || 'all' }}"
          if [[ "$TARGETS" == "all" ]] || echo "$TARGETS" | grep -q "${{ matrix.target }}"; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build fuzz target
        if: steps.check.outputs.run == 'true'
        run: cargo +nightly fuzz build ${{ matrix.target }}

      - name: Seed corpus
        if: steps.check.outputs.run == 'true'
        run: |
          mkdir -p "fuzz/corpus/${{ matrix.target }}"

          # Universal seeds (work for all targets)
          # Full happy-path lifecycle
          printf '\x00\x50\x02\x50\x06\x50\x01\x50' > "fuzz/corpus/${{ matrix.target }}/happy_path"
          # Retry exhaustion
          printf '\x00\x50\x0B\x50\x0B\x50\x0B\x50\x0B\x50\x0B\x50' > "fuzz/corpus/${{ matrix.target }}/retry_exhaust"
          # Health degradation cascade
          printf '\x00\x50\x02\x50\x07\x50\x08\x50\x0B\x50' > "fuzz/corpus/${{ matrix.target }}/health_cascade"
          # Sleep/wake storm
          printf '\x09\x50\x0A\x50\x09\x50\x0A\x50\x09\x05\x0A\x05' > "fuzz/corpus/${{ matrix.target }}/sleep_storm"
          # All chaos variants
          printf '\x0E\x50\x0F\x50\x10\x50\x11\x50\x12\x50\x13\x50\x14\x50\x15\x50' > "fuzz/corpus/${{ matrix.target }}/chaos_all"
          # Wrong server during reconnect
          printf '\x00\x50\x02\x50\x03\x50\x1B\x50\x1C\x50' > "fuzz/corpus/${{ matrix.target }}/wrong_server"
          # Rapid-fire (timing byte < 10)
          printf '\x00\x03\x02\x03\x07\x03\x08\x03\x0B\x03' > "fuzz/corpus/${{ matrix.target }}/rapid_fire"
          # ConnectionFailed and EndpointFailed
          printf '\x00\x50\x0C\x50\x00\x50\x0D\x50' > "fuzz/corpus/${{ matrix.target }}/definitive_failures"
          # NmVpnChanged during connection
          printf '\x00\x50\x02\x50\x04\x50\x12\x50' > "fuzz/corpus/${{ matrix.target }}/vpn_switch"
          # NmDeviceChanged during various states
          printf '\x00\x50\x02\x50\x05\x50\x07\x50\x05\x50' > "fuzz/corpus/${{ matrix.target }}/device_change"

      - name: Run fuzzer
        if: steps.check.outputs.run == 'true'
        run: |
          HOURS=${{ github.event.inputs.hours_per_shard || '6' }}
          SECONDS=$((HOURS * 3600))

          # Cap at 6 hours for GitHub Actions limits
          if [ "$SECONDS" -gt 21600 ]; then
            SECONDS=21600
          fi

          echo "=== ${{ matrix.target }} shard ${{ matrix.shard }}/8 ==="
          echo "Duration: ${SECONDS}s (${HOURS}h)"
          echo "Seed: ${{ matrix.shard }}"

          cargo +nightly fuzz run ${{ matrix.target }} \
            -- \
            -max_total_time=${SECONDS} \
            -seed=${{ matrix.shard }} \
            -print_final_stats=1 \
            -max_len=65536 \
            -use_value_profile=1 \
            -reduce_inputs=1

      - name: Upload corpus
        if: always() && steps.check.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: corpus-${{ matrix.target }}-shard-${{ matrix.shard }}
          path: fuzz/corpus/${{ matrix.target }}/
          retention-days: 30

      - name: Upload crashes
        if: failure() && steps.check.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: crashes-${{ matrix.target }}-shard-${{ matrix.shard }}
          path: fuzz/artifacts/${{ matrix.target }}/
          retention-days: 90

  # ================================================================
  # Summary
  # ================================================================
  report:
    name: "MOAB Results"
    needs: fuzz
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Report
        run: |
          echo "============================================"
          echo "  STATE MACHINE MOAB - FUZZ REPORT"
          echo "============================================"
          echo ""
          echo "Targets: 5"
          echo "Shards per target: 8"
          echo "Total parallel jobs: 40"
          echo ""

          if [[ "${{ needs.fuzz.result }}" == "failure" ]]; then
            echo "::error::CRASHES FOUND. The state machine has a bug."
            echo "Download crash artifacts for reproduction inputs."
            exit 1
          elif [[ "${{ needs.fuzz.result }}" == "success" ]]; then
            echo "ALL TARGETS PASSED."
            echo ""
            echo "What was proven:"
            echo "  [1] No event sequence can panic the state machine"
            echo "  [2] The state machine is purely deterministic"
            echo "  [3] UserDisable is always an escape hatch to Disconnected"
            echo "  [4] The state machine works for all max_retries values (0 to u32::MAX)"
            echo "  [5] Configuration differences cannot violate structural invariants"
            echo "  [6] 13 invariants checked after every single event"
            echo "  [7] Transition reasons match resulting states"
            echo "  [8] All VpnState methods (Display, name, server_name, is_active, is_busy) never panic"
            echo ""
            echo "The state machine survived. Ship it."
          else
            echo "::warning::Run was cancelled or hit infrastructure issues."
            exit 1
          fi
