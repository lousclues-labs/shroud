[package]
name = "openvpn-tray"
version = "0.1.0"
edition = "2021"
description = "A system tray application for managing OpenVPN connections with auto-reconnect"
authors = ["OpenVPN Tray Contributors"]
license = "MIT"
repository = "https://github.com/loujr/archtools"
readme = "README.md"

# Arch Linux Setup Instructions:
# Install required system packages:
#   sudo pacman -S openvpn polkit rust
# 
# The application uses:
# - OpenVPN for VPN connections
# - Polkit (pkexec) for privilege escalation
# - D-Bus for StatusNotifierItem (SNI) tray support on KDE Plasma

[dependencies]
# Native KDE/SNI tray support - do NOT use tray-icon or libappindicator
ksni = "0.2.2"

# Async runtime with required features for process management
tokio = { version = "1.45.1", features = ["rt-multi-thread", "process", "fs", "time", "signal", "sync", "macros"] }

# Desktop notifications via D-Bus
notify-rust = "4.11.7"

# Filename parsing for clean menu display
regex = "1.11.1"

# Low-level system calls for signal handling
libc = "0.2.172"

# Unix-specific functionality for process management
nix = { version = "0.29.0", features = ["signal", "process"] }
